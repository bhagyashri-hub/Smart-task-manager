{% extends 'base.html' %}
{% block title %}New Task – TaskFlow{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h3 class="page-title"><i class="bi bi-plus-square me-2 text-primary"></i>Create Task</h3>
    <p class="text-muted mb-0">Assign a new task to your team</p>
  </div>
  <a href="{{ url_for('tasks.list_tasks') }}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Back
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card">
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('tasks.create_task') }}" novalidate>

          <!-- Title -->
          <div class="mb-3">
            <label for="title" class="form-label fw-semibold">
              Task Title <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="title" name="title"
                   placeholder="e.g. Design login screen" required autofocus>
          </div>

          <!-- Description -->
          <div class="mb-3">
            <label for="description" class="form-label fw-semibold">Description</label>
            <textarea class="form-control" id="description" name="description"
                      rows="3" placeholder="Detailed description of the task..."></textarea>
          </div>

          <div class="row g-3 mb-3">
            <!-- Project -->
            <div class="col-md-6">
              <label for="project_id" class="form-label fw-semibold">
                Project <span class="text-danger">*</span>
              </label>
              <select class="form-select" id="project_id" name="project_id" required>
                <option value="">Select a project...</option>
                {% for project in projects %}
                <option value="{{ project.id }}">{{ project.name }}</option>
                {% endfor %}
              </select>
              {% if not projects %}
              <div class="form-text text-warning">
                <i class="bi bi-exclamation-circle me-1"></i>
                No projects yet. <a href="{{ url_for('projects.create_project') }}">Create one first.</a>
              </div>
              {% endif %}
            </div>

            <!-- Assigned To -->
            <div class="col-md-6">
              <label for="assigned_to" class="form-label fw-semibold">Assign To</label>
              <select class="form-select" id="assigned_to" name="assigned_to">
                <option value="">Unassigned</option>
                {% for member in members %}
                <option value="{{ member.id }}">
                  {{ member.username }} ({{ member.role.title() }})
                </option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="row g-3 mb-3">
            <!-- Priority -->
            <div class="col-md-4">
              <label for="priority" class="form-label fw-semibold">Priority</label>
              <select class="form-select" id="priority" name="priority">
                <option value="low">🟢 Low</option>
                <option value="medium" selected>🟡 Medium</option>
                <option value="high">🔴 High</option>
              </select>
            </div>

            <!-- Status -->
            <div class="col-md-4">
              <label for="status" class="form-label fw-semibold">Status</label>
              <select class="form-select" id="status" name="status">
                <option value="pending" selected>⏳ Pending</option>
                <option value="completed">✅ Completed</option>
              </select>
            </div>

            <!-- Deadline -->
            <div class="col-md-4">
              <label for="deadline" class="form-label fw-semibold">Deadline</label>
              <input type="date" class="form-control" id="deadline" name="deadline">
            </div>
          </div>

          <hr class="my-4">

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">
              <i class="bi bi-plus-circle me-2"></i>Create Task
            </button>
            <a href="{{ url_for('tasks.list_tasks') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
