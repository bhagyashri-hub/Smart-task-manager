{% extends 'base_auth.html' %}
{% block title %}Register – TaskFlow{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card" style="max-width: 480px;">
    <div class="text-center mb-4">
      <div class="auth-logo">
        <i class="bi bi-person-plus-fill"></i>
      </div>
      <h2 class="fw-bold mt-3">Create Account</h2>
      <p class="text-muted">Join your team on TaskFlow</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}" novalidate>
      <!-- Username -->
      <div class="mb-3">
        <label for="username" class="form-label fw-semibold">Username <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" id="username" name="username"
                 placeholder="Min 3 characters" required minlength="3">
        </div>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label for="email" class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" id="email" name="email"
                 placeholder="you@example.com" required>
        </div>
      </div>

      <!-- Role -->
      <div class="mb-3">
        <label for="role" class="form-label fw-semibold">Role</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-shield"></i></span>
          <select class="form-select" id="role" name="role">
            <option value="member">Member</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-text">Admins can manage projects, tasks, and users.</div>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label for="password" class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="Min 6 characters" required minlength="6">
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="mb-4">
        <label for="confirm_password" class="form-label fw-semibold">Confirm Password <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                 placeholder="Repeat password" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-person-check me-2"></i>Create Account
      </button>
    </form>

    <hr class="my-4">

    <p class="text-center text-muted mb-0">
      Already have an account?
      <a href="{{ url_for('auth.login') }}" class="fw-semibold text-decoration-none">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
