{% extends 'base.html' %}
{% block title %}New Project – TaskFlow{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h3 class="page-title"><i class="bi bi-folder-plus me-2 text-primary"></i>Create Project</h3>
    <p class="text-muted mb-0">Set up a new project for your team</p>
  </div>
  <a href="{{ url_for('projects.list_projects') }}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Back
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card">
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('projects.create_project') }}" novalidate>
          <div class="mb-4">
            <label for="name" class="form-label fw-semibold">
              Project Name <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control form-control-lg" id="name" name="name"
                   placeholder="e.g. Website Redesign" required autofocus>
          </div>

          <div class="mb-4">
            <label for="description" class="form-label fw-semibold">Description</label>
            <textarea class="form-control" id="description" name="description"
                      rows="4" placeholder="What's this project about?"></textarea>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">
              <i class="bi bi-check-circle me-2"></i>Create Project
            </button>
            <a href="{{ url_for('projects.list_projects') }}" class="btn btn-outline-secondary">
              Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
