{% extends 'base_auth.html' %}
{% block title %}Login – TaskFlow{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <!-- Logo / Brand -->
    <div class="text-center mb-4">
      <div class="auth-logo">
        <i class="bi bi-kanban-fill"></i>
      </div>
      <h2 class="fw-bold mt-3">Welcome Back</h2>
      <p class="text-muted">Sign in to TaskFlow</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
      <!-- Username -->
      <div class="mb-3">
        <label for="username" class="form-label fw-semibold">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" id="username" name="username"
                 placeholder="Enter your username" required autofocus>
        </div>
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label for="password" class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="Enter your password" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <hr class="my-4">

    <p class="text-center text-muted mb-0">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}" class="fw-semibold text-decoration-none">Create one</a>
    </p>

    <!-- Demo credentials hint -->
    <div class="alert alert-info mt-4 mb-0 small">
      <i class="bi bi-info-circle me-1"></i>
      <strong>Default Admin:</strong> username <code>admin</code> / password <code>admin123</code>
    </div>
  </div>
</div>
{% endblock %}
